# PlantSim-Agent QA evaluation set (Phase 4 #2)
#
# Hand-graded queries that the underlying MCP tools must satisfy when the
# index is built from the bundled `kb_minimal/` corpus alone. No LLM is in
# the loop — the runner calls each tool directly and asserts that the
# expected file_path (and, when given, a section substring) appears among
# the top_k hits.
#
# Schema
# ------
#   id            short stable id
#   query         human-readable description of the question
#   tool          one of: search_help | get_api
#   args          tool keyword args
#   top_k         results to fetch (default 5)
#   expected:     list of expected hits — each has:
#       file_contains       substring that hit.file_path must contain
#       section_contains    (optional) substring that hit.section must contain
#   min_match     how many of the expected entries must be matched (default = len(expected))
#
# Notes:
#  * Some queries deliberately use get_api (precise lookup) and others
#    search_help (FTS) — the eval verifies both paths.
#  * Every expected file_path lives inside kb_minimal/ so this set
#    works without a licensed PTS Help on disk.

- id: q01-buffer-capacity
  query: How do I set a Buffer's capacity in SimTalk?
  tool: search_help
  args: { query: "NumMU Capacity max MUs" }
  expected:
    - file_contains: simtalk-api-index.md
      section_contains: Buffer

