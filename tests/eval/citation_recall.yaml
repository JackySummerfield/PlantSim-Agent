# PlantSim-Agent citation-reviewer recall fixtures (Phase 4 #2)
#
# Each fixture is a response body that the runner feeds to a pure-Python
# port of the citation-reviewer's regex contract (see
# agents/citation-reviewer.agent.md). The runner asserts that the verdict
# matches `expected.status`.
#
# Status taxonomy:
#   ok                    — anchor present, no forbidden phrases, no malformed refusal
#   missing_citations     — required anchor for the declared workflow is absent
#   suspicious_citations  — anchor present but contains a forbidden-source phrase
#   malformed_refusal     — "❌ Cannot verify:" line without the required cascade trace
#
# The runner uses these to verify the reviewer's regex contract directly,
# without spinning up the actual LLM-backed subagent.

- id: c01-w1-ok
  workflow: W1
  expected: { status: ok }
  body: |
    The Buffer's capacity is set via the `Capacity` attribute.

    **Sources:**
